name: Bug report
description: Report a reproducible defect in the project management application.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please remove passwords, tokens, personal data and private project content before submitting.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and the expected behavior.
      placeholder: I expected ..., but the application ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Sign in as ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Python 3.12, Chrome 128, PythonAnywhere
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Include sanitized errors or test output only.
      render: text
