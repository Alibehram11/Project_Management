name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile Python sources
        run: >-
          python -m py_compile
          server.py advanced_rules.py security_tests.py advanced_tests.py
          endpoint_quality_tests.py
          security_advanced_tests.py wsgi.py
          integrations/atolye/app.py integrations/atolye/models.py

      - name: Run security regression suite
        run: python security_tests.py

      - name: Run advanced scenario suite
        run: python advanced_tests.py

      - name: Run advanced security suite
        run: python security_advanced_tests.py

      - name: Run endpoint quality checklist
        run: python endpoint_quality_tests.py

      - name: Validate runtime and Word templates
        run: python server.py --check
